<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <rect width="80" height="80" fill="#bd877a"/>
  <!-- Mortar lines (horizontal) -->
  <g stroke="#a57569" stroke-width="0.8" opacity="0.3" fill="none">
    <line x1="0" y1="20" x2="80" y2="20"/>
    <line x1="0" y1="40" x2="80" y2="40"/>
    <line x1="0" y1="60" x2="80" y2="60"/>
  </g>
  <!-- Mortar lines (vertical, offset per row) -->
  <g stroke="#a57569" stroke-width="0.8" opacity="0.3" fill="none">
    <!-- Row 1: 0-20 -->
    <line x1="36" y1="0" x2="36" y2="20"/>
    <line x1="72" y1="0" x2="72" y2="20"/>
    <!-- Row 2: 20-40, offset -->
    <line x1="18" y1="20" x2="18" y2="40"/>
    <line x1="54" y1="20" x2="54" y2="40"/>
    <!-- Row 3: 40-60 -->
    <line x1="36" y1="40" x2="36" y2="60"/>
    <line x1="72" y1="40" x2="72" y2="60"/>
    <!-- Row 4: 60-80, offset -->
    <line x1="18" y1="60" x2="18" y2="80"/>
    <line x1="54" y1="60" x2="54" y2="80"/>
  </g>
  <!-- Subtle brick face highlights -->
  <g fill="#cd978a" opacity="0.2">
    <rect x="4" y="4" width="28" height="12" rx="2"/>
    <rect x="40" y="4" width="28" height="12" rx="2"/>
    <rect x="22" y="24" width="28" height="12" rx="2"/>
    <rect x="58" y="24" width="18" height="12" rx="2"/>
    <rect x="4" y="44" width="28" height="12" rx="2"/>
    <rect x="40" y="44" width="28" height="12" rx="2"/>
    <rect x="22" y="64" width="28" height="12" rx="2"/>
    <rect x="58" y="64" width="18" height="12" rx="2"/>
  </g>
  <!-- Subtle texture dots -->
  <g fill="#9b6c60" opacity="0.15">
    <circle cx="16" cy="10" r="0.7"/>
    <circle cx="52" cy="8" r="0.6"/>
    <circle cx="30" cy="30" r="0.7"/>
    <circle cx="66" cy="32" r="0.6"/>
    <circle cx="16" cy="50" r="0.7"/>
    <circle cx="52" cy="52" r="0.6"/>
    <circle cx="30" cy="72" r="0.7"/>
    <circle cx="66" cy="70" r="0.6"/>
  </g>
</svg>
